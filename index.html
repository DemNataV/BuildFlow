<!DOCTYPE html>
<html>
<head>
    <title>Редактор Графа</title>
    <meta charset="utf-8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="questionnaire.js"></script>
    <script src="questionnaire-ui.js"></script>
</head>
<body>

    <div id="app"></div>

    <div id="graph-container" style="display:none;">
        <div class="controls">
            <button id="newProjectButton" class="primary">🔄 Новый проект</button>
            <label for="fileInput" class="file-button primary">
                📂 Загрузить JSON
                <input type="file" id="fileInput" accept=".json" hidden>
            </label>
            <span id="fileName" class="file-name"></span>
            <button id="saveButton" class="primary">💾 Сохранить</button>
            <button id="addActionButton">➕ Действие</button>
            <button id="addStateButton">➖ Объект</button>
            <button id="addLinkButton" class="success">+ Связь (1 → 2)</button>
            <button id="runLayoutButton">Обновить компоновку</button>
            <span class="hint">Клик на <b>Источник</b>, затем на <b>Цель</b>. Удаление: <b>Del</b></span>
            <div id="summary-bar"></div>
        </div>
        <div id="cy"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
